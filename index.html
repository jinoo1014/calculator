<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소득세 계산기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 32px 24px 28px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 16px;
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            flex: 1;
        }
        .logo {
            width: 146px;
            height: 70px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .form-group { margin-bottom: 22px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            transition: all 0.3s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-unit { color:#999; font-size:13px; margin-top:4px; }
        .button-group { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
        button {
            padding: 11px 16px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }
        .btn-calculate:hover { transform: translateY(-1px); box-shadow:0 8px 20px rgba(102,126,234,0.3); }
        .btn-secondary { background:#f5f5f5; color:#333; border:2px solid #e0e0e0; }
        .btn-secondary:hover { background:#efefef; border-color:#ccc; }
        .result-section {
            background:#f9f9f9;
            border-left:4px solid #667eea;
            padding:18px 16px;
            border-radius:8px;
            margin-bottom:22px;
            display:none;
        }
        .result-section.show { display:block; animation:slideIn 0.3s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
        .result-item { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #e0e0e0; flex-wrap:wrap; gap:8px; }
        .result-item:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
        .result-label { font-size:14px; color:#666; font-weight:500; }
        .result-value { font-size:17px; font-weight:700; color:#333; }
        .result-value.highlight { color:#667eea; font-size:22px; }
        .result-item.formula { flex-direction:column; align-items:flex-start; }
        #resultFormula { font-size:14px; color:#666; width:100%; margin-top:4px; text-align:right; word-break:keep-all; }
        .contact-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 16px 14px;
            border-radius: 8px;
            text-align: center;
            margin-top: 18px;
        }
        .contact-section-title { font-size:15px; font-weight:600; margin-bottom:10px; }
        .contact-section-title span { font-weight:400; font-size:14px; margin-left:6px; }
        .contact-buttons { display:flex; flex-direction:column; gap:8px; align-items:stretch; }
        .contact-button { display:inline-flex; align-items:center; justify-content:center; width:100%; min-height:46px; padding:10px 14px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; box-sizing:border-box; border:none; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
        .contact-button.phone,
        .contact-button.save-image { background:#ffffff; color:#667eea; }
        .contact-button.kakao-channel { background:#fee500; color:#222222; }
        .kakao-icon { width:18px; height:18px; object-fit:contain; margin-right:6px; display:block; }
                .modal {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .close-btn:hover { color: #333; }
        .tax-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 13px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .tax-table thead { background: #667eea; color: white; }
        .tax-table th {
            padding: 10px;
            text-align: center;
            font-weight: 600;
        }
        .tax-table td {
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid #e0e0e0;
        }
        .tax-table td:first-child {
            text-align: left;
            background: #f9f9f9;
            font-weight: 500;
        }
        .tax-table tbody tr:last-child td { border-bottom: none; }

@media (max-width:600px) {
            .container { padding:24px 18px 20px; }
            .title { font-size:22px; }
            .logo { width:132px; height:62px; }
        }
    </style>
</head>

    <script>
        const taxBrackets = [
            { min: 0, max: 14000000, rate: 0.06, deduction: 0 },
            { min: 14000000, max: 50000000, rate: 0.15, deduction: 1260000 },
            { min: 50000000, max: 88000000, rate: 0.24, deduction: 5760000 },
            { min: 88000000, max: 150000000, rate: 0.35, deduction: 15440000 },
            { min: 150000000, max: 300000000, rate: 0.38, deduction: 19940000 },
            { min: 300000000, max: 500000000, rate: 0.40, deduction: 25940000 },
            { min: 500000000, max: 1000000000, rate: 0.42, deduction: 35940000 },
            { min: 1000000000, max: Infinity, rate: 0.45, deduction: 65940000 }
        ];

        const incomeInput = document.getElementById('taxableIncome');
        const calculateBtn = document.getElementById('calculateBtn');
        const tableBtn = document.getElementById('tableBtn');
        const resultSection = document.getElementById('resultSection');
        const saveImageBtn = document.getElementById('saveImageBtn');

        function formatCurrency(num) {
            return new Intl.NumberFormat('ko-KR', { style:'currency', currency:'KRW', minimumFractionDigits:0, maximumFractionDigits:0 }).format(num);
        }

        function calculateTax(income) {
            if (income <= 0) return null;
            for (const b of taxBrackets) {
                if (income > b.min && income <= b.max) {
                    const tax = Math.max(0, Math.floor(income * b.rate - b.deduction));
                    return { tax, rate: b.rate * 100, formula: `${formatCurrency(income)} × ${(b.rate*100).toFixed(0)}% - ${formatCurrency(b.deduction)}` };
                }
            }
            return null;
        }

        function performCalculation() {
            const income = parseInt((incomeInput.value || '').replace(/,/g,''), 10);
            if (!income || income <= 0) {
                alert('과세표준 금액을 0보다 큰 숫자로 입력해주세요.');
                incomeInput.focus();
                return;
            }
            const r = calculateTax(income);
            if (!r) { alert('세액 계산 중 오류가 발생했습니다.'); return; }
            document.getElementById('resultIncome').textContent = formatCurrency(income);
            document.getElementById('resultRate').textContent = r.rate.toFixed(0) + '%';
            document.getElementById('resultFormula').textContent = r.formula;
            document.getElementById('resultTax').textContent = formatCurrency(r.tax);
            resultSection.classList.add('show');
        }

        calculateBtn.addEventListener('click', e => { e.preventDefault(); performCalculation(); });
        incomeInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); performCalculation(); } });
        incomeInput.addEventListener('input', function() {
            let v = this.value.replace(/[^0-9]/g,'');
            this.value = v ? parseInt(v,10).toLocaleString('ko-KR') : '';
        });

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">2026년 종합소득세율표</div><button class="close-btn" id="closeBtn">&times;</button></div>
<table class="tax-table"><thead><tr><th>구간</th><th>과세표준</th><th>세율</th><th>누진공제액</th></tr></thead><tbody>
<tr><td>1단계</td><td>0 ~ 1,400만원</td><td>6%</td><td>0원</td></tr>
<tr><td>2단계</td><td>1,400만원 ~ 5,000만원</td><td>15%</td><td>126만원</td></tr>
<tr><td>3단계</td><td>5,000만원 ~ 8,800만원</td><td>24%</td><td>576만원</td></tr>
<tr><td>4단계</td><td>8,800만원 ~ 1.5억원</td><td>35%</td><td>1,544만원</td></tr>
<tr><td>5단계</td><td>1.5억원 ~ 3억원</td><td>38%</td><td>1,994만원</td></tr>
<tr><td>6단계</td><td>3억원 ~ 5억원</td><td>40%</td><td>2,594만원</td></tr>
<tr><td>7단계</td><td>5억원 ~ 10억원</td><td>42%</td><td>3,594만원</td></tr>
<tr><td>8단계</td><td>10억원 초과</td><td>45%</td><td>6,594만원</td></tr>
</tbody></table>
<div style="font-size:12px;color:#333;margin-top:14px;line-height:1.6;">※ 이 세율표는 2026년 기준입니다.<br>※ 실제 세액은 공제항목, 감면액 등에 따라 달라질 수 있습니다.<br>※ 정확한 세금 계산을 위해 세무사와 상담하시기 바랍니다.</div></div>`;
        document.body.appendChild(modal);
        const closeBtn = modal.querySelector('#closeBtn');

        tableBtn.addEventListener('click', e => { e.preventDefault(); modal.classList.add('show'); });
        closeBtn.addEventListener('click', () => modal.classList.remove('show'));
        modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });

        function wrapText(ctx, text, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let line = '';
            for (const w of words) {
                const test = line ? line + ' ' + w : w;
                if (ctx.measureText(test).width > maxWidth && line) {
                    lines.push(line);
                    line = w;
                } else { line = test; }
            }
            if (line) lines.push(line);
            return lines;
        }

        function drawRoundedRect(ctx,x,y,w,h,r) {
            ctx.beginPath();
            ctx.moveTo(x+r,y);
            ctx.arcTo(x+w,y,x+w,y+h,r);
            ctx.arcTo(x+w,y+h,x,y+h,r);
            ctx.arcTo(x,y+h,x,y,r);
            ctx.arcTo(x,y,x+w,y,r);
            ctx.closePath();
        }

        function saveResultAsImage() {
            if (!resultSection.classList.contains('show')) {
                alert('먼저 소득세를 계산한 다음 사진으로 저장할 수 있습니다.');
                return;
            }
            const incomeText = document.getElementById('resultIncome').textContent;
            const rateText = document.getElementById('resultRate').textContent;
            const formulaText = document.getElementById('resultFormula').textContent;
            const taxText = document.getElementById('resultTax').textContent;

            const canvas = document.createElement('canvas');
            const width = 800, height = 600;
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');

            const grad = ctx.createLinearGradient(0,0,width,height);
            grad.addColorStop(0,'#667eea'); grad.addColorStop(1,'#764ba2');
            ctx.fillStyle = grad; ctx.fillRect(0,0,width,height);

            const cardX=60, cardY=80, cardW=width-120, cardH=height-160;
            ctx.fillStyle = '#ffffff';
            drawRoundedRect(ctx,cardX,cardY,cardW,cardH,20);
            ctx.fill();

            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('소득세 계산 결과', width/2, cardY+50);

            let x = cardX+40, y = cardY+110, gap = 42;
            ctx.textAlign='left';
            ctx.font='16px sans-serif'; ctx.fillStyle='#666'; ctx.fillText('과세표준',x,y);
            ctx.font='bold 20px sans-serif'; ctx.fillStyle='#333'; ctx.fillText(incomeText,x+140,y);
            y+=gap; ctx.font='16px sans-serif'; ctx.fillStyle='#666'; ctx.fillText('적용세율',x,y);
            ctx.font='bold 20px sans-serif'; ctx.fillStyle='#333'; ctx.fillText(rateText,x+140,y);
            y+=gap; ctx.font='16px sans-serif'; ctx.fillStyle='#999'; ctx.fillText('계산식',x,y);
            ctx.font='15px sans-serif'; ctx.fillStyle='#555';
            const lines = wrapText(ctx, formulaText, cardW-220);
            lines.forEach((line,i)=> ctx.fillText(line,x+140,y+(i+1)*22));

            const taxY = cardY+cardH-90;
            ctx.font='16px sans-serif'; ctx.fillStyle='#666'; ctx.fillText('종합소득세',x,taxY);
            ctx.font='bold 26px sans-serif'; ctx.fillStyle='#667eea'; ctx.fillText(taxText,x+140,taxY);

            ctx.font='12px sans-serif'; ctx.fillStyle='#888'; ctx.textAlign='center';
            ctx.fillText('※ 실제 세액은 공제·감면 등 상황에 따라 달라질 수 있습니다.', width/2, cardY+cardH-30);

            const url = canvas.toDataURL('image/png');
            const win = window.open('', '_blank');
            if (win) {
                win.document.write('<html><head><title>소득세 계산 결과</title><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="'+url+'" style="max-width:100%;height:auto;display:block;" alt="소득세 계산 결과 이미지"></body></html>');
                win.document.close();
            } else {
                alert('팝업이 차단되어 있습니다. 브라우저에서 팝업을 허용하고 다시 시도해주세요.');
            }
        }

        saveImageBtn.addEventListener('click', saveResultAsImage);
    </script>
</body>
</html>
