<!DOCTYPE html>
<html lang='ko'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>소득세 계산기 v25</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Noto Sans KR',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}
.container{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:600px;width:100%;padding:32px 24px 18px}
.header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px;border-bottom:2px solid #f0f0f0;padding-bottom:16px}
.title{font-size:26px;font-weight:700;color:#333;flex:1;white-space:nowrap}
.logo{width:146px;height:70px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.logo img{width:100%;height:100%;object-fit:contain;display:block}
.form-group{margin-bottom:22px}
label{display:block;margin-bottom:8px;font-size:20px;font-weight:600;color:#555}
input[type='text']{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:18px;transition:all .3s ease;font-family:'Noto Sans KR',sans-serif}
input[type='text']:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.input-unit{color:#999;font-size:13px;margin-top:4px}
.button-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
button{padding:11px 16px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s ease;font-family:'Noto Sans KR',sans-serif}
.btn-calculate{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;grid-column:1 / -1;white-space:nowrap}
.btn-secondary{background:#f5f5f5;color:#333;border:2px solid #e0e0e0;white-space:nowrap}
.btn-secondary:hover{background:#efefef;border-color:#ccc}
.result-section{background:#f9f9f9;border-left:4px solid #667eea;padding:18px 16px;border-radius:8px;margin-bottom:22px;display:none}
.result-section.show{display:block;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.result-title{font-weight:700;color:#333;font-size:18px;white-space:nowrap}
.result-logo{width:110px;height:48px;flex-shrink:0}
.result-logo img{width:100%;height:100%;object-fit:contain;display:block}
.result-item{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;gap:8px}
.result-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.result-label{font-size:14px;color:#666;font-weight:500}
.result-value{font-size:17px;font-weight:700;color:#333}
.result-value.highlight{color:#667eea;font-size:22px}
.result-item.formula{flex-direction:column;align-items:flex-start}
#resultFormula{font-size:14px;color:#666;width:100%;margin-top:4px;text-align:right;word-break:keep-all}
.modal{display:none;position:fixed;inset:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;overflow-x:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid #f0f0f0;padding-bottom:10px}
.modal-title{font-size:18px;font-weight:700;color:#333;white-space:nowrap}
.close-btn{background:none;border:none;font-size:24px;color:#999;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;padding:0}
.close-btn:hover{color:#333}
.tax-table{width:100%;min-width:560px;border-collapse:collapse;margin:20px 0;font-size:13px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden}
.tax-table thead{background:#667eea;color:#fff}
.tax-table th{padding:10px;text-align:center;font-weight:600;white-space:nowrap}
.tax-table td{padding:10px;text-align:right;border-bottom:1px solid #e0e0e0;white-space:nowrap}
.tax-table td:first-child{text-align:left;background:#f9f9f9;font-weight:500;white-space:nowrap}
.tax-table tbody tr:last-child td{border-bottom:none}
.contact-section{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:18px 16px 14px;border-radius:8px;text-align:center;margin-top:18px}
.contact-section-title{font-size:15px;font-weight:600;margin-bottom:10px;white-space:nowrap}
.contact-section-title span{font-weight:400;font-size:14px;margin-left:6px}
.contact-buttons{display:flex;flex-direction:column;gap:8px;align-items:stretch}
.contact-button{display:inline-flex;align-items:center;justify-content:center;width:100%;min-height:46px;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;box-sizing:border-box;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);white-space:nowrap}
.contact-button.phone,.contact-button.save-image{background:#fff;color:#667eea}
.contact-button.kakao-channel{background:#fee500;color:#222}
.kakao-icon{width:18px;height:18px;object-fit:contain;margin-right:6px;display:block}
.version{margin-top:10px;font-size:12px;color:#999;text-align:right}
@media (max-width:600px){
.container{padding:24px 18px 20px}
.title{font-size:22px}
.logo{width:132px;height:62px}
.button-group{grid-template-columns:1fr}
.btn-secondary{min-width:100%}
.result-logo{width:92px;height:40px}
.result-title{font-size:16px}
.tax-table{min-width:560px}
}
</style>
</head>
<body>
<div class='container'>
  <div class='header'>
    <div class='title'>소득세 계산기</div>
    <div class='logo'><img src='data:image/jpeg;base64,REPLACE_LOGO' alt='이안 로고'></div>
  </div>
  <form id='taxForm'>
    <div class='form-group'>
      <label for='taxableIncome'>과세표준 금액</label>
      <input type='text' id='taxableIncome' placeholder='금액을 입력해주세요' inputmode='numeric'>
      <div class='input-unit'>* 원(₩) 단위로 입력해주세요</div>
